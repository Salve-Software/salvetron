name: Publish salvetron-types

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
    paths:
      - 'packages/salvetron-types/**'
      - '.github/workflows/publish-types.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish @salve-software/salvetron-types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/salvetron-types
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build
        run: yarn build

      - name: Update npm (OIDC trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Check if version already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already published — skipping."
          else
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.published == 'true'
        run: npm publish --provenance
